<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <form action="#" class="form">

        <h1 class="header">Student Registration Form</h1>
        <p>Enter the information carefully</p>
        <fieldset>
            <legend>Personal Information</legend> 
            
            <p>
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name..." required>
            </p>
            <p >
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email..." required>
            </p>
            <p>
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="03XXXXXXXXX" required>
            </p>
            <p>
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" placeholder="Enter your date of birth..." required>
            </p>
            <p>
                <label for="CNIC">CNIC:</label>
                <input type="tel" id="CNIC" name="CNIC" placeholder="Enter your CNIC..." required>
            </p>
            <p>
                <label for="gender">Gender:</label>
                <label for="male">Male</label>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="female">Female</label>
                <input type="radio" id="female" name="gender" value="female" required>
            </p>
        </fieldset>
        <br>
        <fieldset>
            <legend>Academic Information</legend>
            <p>
                <label for="university">University Name:</label>
                <input type="text" id="university" name="university" placeholder="Enter your university..." required>
            </p>
            <p>
                <label for="program">Degree Program:</label>
                <select id="program" name="program" required>
                    <option value="">Select your program</option>
                    <option value="BSCS">BS Computer Science</option>
                    <option value="BSSE">BS Software Engineering</option>
                    <option value="BSIT">BS Information Technology</option>
                    <option value="BBA">BS Cyber Security</option>
                </select>
            </p>
            <p>
                <label for="semester"> Current Semester:</label>
                <input type="number" id="semester" name="semester" placeholder="Enter your semester..." required>
            </p>
            <p>
                <label for="cgpa">CGPA:</label>
                <input type="number" id="cgpa" name="cgpa" placeholder="Enter your CGPA..." required>
            </p>
            <p>
                <label for="skills">Skills:</label>
                <input type="checkbox" id="skills" name="skills" value="Programming" required>
                <label for="skills">Programming</label>
                <input type="checkbox" id="skills" name="skills" value="Design" required>
                <label for="skills">Graphic Design</label>
                <input type="checkbox" id="skills" name="skills" value="Communication" required>
                <label for="skills">Communication</label>
                <input type="checkbox" id="skills" name="skills" value="DevOps" required>
                <label for="skills">DevOps</label>
            </p>
        </fieldset>
        <br>
        <fieldset>
            <legend>Account Information</legend>
            <p>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="Enter your username..." required>
            </p>
            <p>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password..." required>
            </p>
            <p>
                <label for="cPassword">Confirm Password:</label>
                <input type="password" id="cPassword" name="cPassword" placeholder="Confirm your password..." required>
            </p>
        </fieldset>
        <br>
        <fieldset>
            <legend>Additional Information</legend>
            <p>
                <label for="city">City:</label>
                <input type="text" id="city" name="city" placeholder="Enter your city..." required>
            </p>
            <p>
                <label for="country">Country:</label>
                <input type="text" id="country" name="country" placeholder="Enter your country..." required>
            </p>
            <p>
                <label for="pPicture">Profile Picture:</label>
                <input type="file" id="pPicture" name="pPicture" accept="image/*" required>
            </p>
            <p>
                <label for="bio">Short Bio:</label>
                <textarea id="bio" name="bio" placeholder="Write a short bio..." required></textarea>
            </p>
        </fieldset>
        <button type="submit">Register</button>
            <button type="reset">Clear Form</button>
    </form>
</body>
</html>
